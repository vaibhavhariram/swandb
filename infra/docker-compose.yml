services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chronosdb
      POSTGRES_PASSWORD: chronosdb
      POSTGRES_DB: chronosdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronosdb -d chronosdb"]
      interval: 2s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5
